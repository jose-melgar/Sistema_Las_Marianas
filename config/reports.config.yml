# ======================================================================
# CONFIGURACIÓN DEL ORQUESTADOR (CORREGIDA - RUTA FINAL)
# ======================================================================

report_registry:
  informe_emo_estandar:
    # --- RUTA CORREGIDA AQUÍ ---
    # Apunta a la clase 'ReporteEstandarService' dentro del archivo 'service.py'
    generator_class: "las_marianas_so.reports.generators.reporte_estandar.generator.ReporteEstandarGenerator"
    
    display_name: "Informe EMO Estándar (Anclado a Títulos)"
    description: "Genera el informe EMO buscando títulos como 'Epidemiología laboral' en la plantilla."
    
    template_path: "templates/informes/prueba.docx"

    # Parámetros (sin cambios)
    parameters:
      - name: "obra"
        type: "str"
        prompt: "Seleccione la Obra/Planta"
        dynamic_options:
          source: "trabajadores"
          column: "obra"
      - name: "year"
        type: "int"
        prompt: "Ingrese el año del informe (ej: 2023)"
      - name: "month"
        type: "int"
        prompt: "Ingrese el mes del informe (1-12)"